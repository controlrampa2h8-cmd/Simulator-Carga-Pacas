<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Informe: Carga de Pacas 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; display: flex; background: #121212; }
        #ui-panel {
            width: 360px; height: 100vh; background: #1a1a1a; color: #f0f0f0;
            padding: 20px; box-sizing: border-box; z-index: 10; border-right: 1px solid #333;
            box-shadow: 4px 0 15px rgba(0,0,0,0.8); overflow-y: auto;
        }
        canvas { display: block; cursor: crosshair; }
        .control-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; font-weight: 600; }
        select, button { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; font-size: 14px; }
        select { background: #2d2d2d; color: white; outline: none; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        button { background: #0078d7; color: white; border: none; cursor: pointer; transition: 0.2s; font-weight: bold; margin-top: 5px; }
        button:hover { background: #005a9e; }
        button.delete { background: #c0392b; margin-top: 15px; }
        button.export { background: #27ae60; margin-top: 10px; }
        .stats { background: #252525; padding: 15px; border-radius: 6px; border: 1px solid #444; margin-top: 20px; }
        .stats div { margin-bottom: 8px; font-size: 14px; }
        .guide-panel { background: rgba(52, 152, 219, 0.1); border-left: 4px solid #3498db; padding: 10px; margin-top: 15px; border-radius: 4px; font-size: 13px; color: #3498db; font-weight: bold; line-height: 1.4;}
        .guide-panel.magnetic { background: rgba(46, 204, 113, 0.1); border-color: #2ecc71; color: #2ecc71; }
        .warning { color: #e74c3c; font-weight: bold; font-size: 13px; margin-top: 10px; display: none; padding: 10px; background: rgba(231,76,60,0.1); border-radius: 4px; border-left: 4px solid #e74c3c; line-height: 1.4; }
        .warning.leftover { background: rgba(230, 126, 34, 0.1); border-color: #e67e22; color: #e67e22; }
        .warning.info { background: rgba(52, 152, 219, 0.1); border-color: #3498db; color: #3498db; display: block; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2 style="color: #3498db; margin-top: 0; font-size: 22px;">Simulador de Carga</h2>
    
    <div class="control-group">
        <label>Tamaño del Camión:</label>
        <select id="plataformaLargo">
            <option value="12.5">12.50 metros</option>
            <option value="13.0">13.00 metros</option>
            <option value="13.2">13.20 metros</option>
            <option value="13.5">13.50 metros</option>
        </select>
    </div>

    <div class="control-group">
        <label>Modo de Carga:</label>
        <select id="modoCarga" style="border-color: #3498db;">
            <option value="estandar">Estándar (Pegadas a los lados)</option>
            <option value="central">Separación Central (10cm del eje)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Tipo de Caja (Orientación):</label>
        <select id="orientacionPaca">
            <option value="0">Acostada (Azul - Horizontal)</option>
            <option value="1">A lo largo (Verde - Transversal)</option>
            <option value="2">Parada (Amarillo - Vertical)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Nivel de Altura:</label>
        <select id="nivelElegido">
            <option value="1">Piso 1 (Base)</option>
            <option value="2">Piso 2 (Medio)</option>
            <option value="3">Piso 3 (Superior)</option>
        </select>
    </div>

    <div class="stats">
        <div style="color: #3498db; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px;">Cajas totales: <span id="count">0</span></div>
        <div style="margin-top:10px;">Altura total desde el suelo: <span id="alturaActual">1.40</span> m</div>
        
        <div class="guide-panel" id="estadoGuia">
            🔓 MODO LIBRE<br>
            <span style="font-size: 11px; font-weight: normal; color: #f0f0f0;">Coloca la caja donde desees.</span>
        </div>

        <div id="overhangMsg" class="warning">
            ⚠️ POSICIÓN INVÁLIDA<br>
            <span id="overhangDetails" style="font-size: 12px; color: #fff;"></span>
        </div>
    </div>

    <button class="delete" onclick="removeLast()">Quitar Última Caja</button>
    <button class="export" onclick="exportPDF()">Descargar Informe PDF</button>
</div>

<script>
    let scene, camera, renderer, controls, raycaster, mouse;
    let plataformaGroup, plane;
    let rollOverMesh, rollOverMaterial;
    let pacas = [];
    
    let validSlots = [];
    let guideMeshes = [];
    let currentMagneticSlot = null;
    let isModoLibre = true; 
    
    // Memoria independiente por cada piso y modo
    let pacasTracker = {
        '1': { '0': 0, '1': 0, '2': 0 },
        '2': { '0': 0, '1': 0, '2': 0 },
        '3': { '0': 0, '1': 0, '2': 0 }
    };

    const ANCHO_PLATAFORMA = 2.60;
    const ALTURA_SUELO = 1.40; 
    const GRID_SNAP = 0.01;

    function getGapActual() {
        const orient = document.getElementById('orientacionPaca').value;
        if (orient === "1") return 0.12; // Transversal: 12cm
        return 0.065; // Horizontal y Vertical: 6.5cm
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 360) / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 10, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.maxPolarAngle = Math.PI / 2 - 0.05; 

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const rollOverGeo = new THREE.BoxGeometry(1, 1, 1);
        rollOverMaterial = new THREE.MeshBasicMaterial({ color: 0x3498db, opacity: 0.7, transparent: true });
        rollOverMesh = new THREE.Mesh(rollOverGeo, rollOverMaterial);
        scene.add(rollOverMesh);

        const planeGeo = new THREE.PlaneGeometry(100, 100);
        planeGeo.rotateX(-Math.PI / 2);
        plane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ visible: false }));
        plane.position.y = ALTURA_SUELO;
        scene.add(plane);

        crearRemolque(parseFloat(document.getElementById('plataformaLargo').value));

        renderer.domElement.addEventListener('mousemove', onPointerMove);
        renderer.domElement.addEventListener('click', onClickPlacer);
        window.addEventListener('resize', onWindowResize);
        
        // Listeners
        document.getElementById('modoCarga').addEventListener('change', () => {
            const modo = document.getElementById('modoCarga').value;
            const orientSelect = document.getElementById('orientacionPaca');
            if (modo === 'central') {
                orientSelect.value = "0"; // Fuerza distribución horizontal
                orientSelect.disabled = true;
            } else {
                orientSelect.disabled = false;
            }
            updatePlataforma(); // Limpia al cambiar de modo estructural
        });

        document.getElementById('orientacionPaca').addEventListener('change', onConfigChange);
        document.getElementById('plataformaLargo').addEventListener('change', updatePlataforma);
        document.getElementById('nivelElegido').addEventListener('change', onConfigChange);

        onConfigChange();
        animate();
    }

    function crearRemolque(largo) {
        if(plataformaGroup) scene.remove(plataformaGroup);
        plataformaGroup = new THREE.Group();

        const geoCama = new THREE.BoxGeometry(ANCHO_PLATAFORMA, 0.15, largo);
        const matCama = new THREE.MeshPhongMaterial({ color: 0x4a5353 }); 
        const cama = new THREE.Mesh(geoCama, matCama);
        cama.position.y = ALTURA_SUELO - 0.075;
        plataformaGroup.add(cama);

        const altoBarrera = 1.8;
        const geoBarrera = new THREE.BoxGeometry(ANCHO_PLATAFORMA, altoBarrera, 0.1);
        const matBarrera = new THREE.MeshPhongMaterial({ color: 0xc0392b }); 
        const barrera = new THREE.Mesh(geoBarrera, matBarrera);
        barrera.position.set(0, ALTURA_SUELO + (altoBarrera/2), -largo/2 - 0.05);
        plataformaGroup.add(barrera);

        const matEje = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 });
        plataformaGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, ALTURA_SUELO + 0.01, -largo/2), new THREE.Vector3(0, ALTURA_SUELO + 0.01, largo/2)]), matEje));
        plataformaGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-ANCHO_PLATAFORMA/2, ALTURA_SUELO + 0.01, 0), new THREE.Vector3(ANCHO_PLATAFORMA/2, ALTURA_SUELO + 0.01, 0)]), matEje));

        scene.add(plataformaGroup);
    }

    function getDimPaca() {
        const orient = document.getElementById('orientacionPaca').value;
        if(orient === "0") return { x: 1.40, y: 1.10, z: 1.10, color: 0x3498db }; 
        if(orient === "1") return { x: 1.10, y: 1.10, z: 1.40, color: 0x2ecc71 }; 
        return { x: 1.10, y: 1.40, z: 1.10, color: 0xf1c40f }; 
    }

    function onConfigChange() {
        const orient = document.getElementById('orientacionPaca').value;
        const nivel = document.getElementById('nivelElegido').value;
        
        if (pacasTracker[nivel][orient] > 0) { 
            isModoLibre = false; 
        } else { 
            isModoLibre = true; 
        }
        
        const dim = getDimPaca();
        rollOverMesh.geometry.dispose();
        rollOverMesh.geometry = new THREE.BoxGeometry(dim.x, dim.y, dim.z);
        rollOverMesh.material.color.setHex(dim.color);
        calcularGuiasMagneticas();
    }

    function chequearColisiones(x, y, z, dim) {
        const gapZ = getGapActual();
        const halfGapZ = gapZ / 2 - 0.005;
        const epsilonX = 0.005;
        const epsilonY = 0.05; 

        const cajaFantasma = new THREE.Box3(
            new THREE.Vector3(x - dim.x/2 + epsilonX, y - dim.y/2 + epsilonY, z - dim.z/2 - halfGapZ),
            new THREE.Vector3(x + dim.x/2 - epsilonX, y + dim.y/2 - epsilonY, z + dim.z/2 + halfGapZ)
        );

        for (let i = 0; i < pacas.length; i++) {
            const p = pacas[i];
            const pDim = { x: p.geometry.parameters.width, y: p.geometry.parameters.height, z: p.geometry.parameters.depth };
            const pPos = p.position;
            const cajaPaca = new THREE.Box3(
                new THREE.Vector3(pPos.x - pDim.x/2 + epsilonX, pPos.y - pDim.y/2 + epsilonY, pPos.z - pDim.z/2 - halfGapZ),
                new THREE.Vector3(pPos.x + pDim.x/2 - epsilonX, pPos.y + pDim.y/2 - epsilonY, pPos.z + pDim.z/2 + halfGapZ)
            );
            if (cajaFantasma.intersectsBox(cajaPaca)) return true; 
        }
        return false; 
    }

    function calcularGuiasMagneticas() {
        guideMeshes.forEach(m => scene.remove(m));
        guideMeshes = [];
        validSlots = [];
        
        if (isModoLibre) return;
        
        const dim = getDimPaca();
        const gapActual = getGapActual();
        const nivel = document.getElementById('nivelElegido').value;
        const largoPlat = parseFloat(document.getElementById('plataformaLargo').value);
        const isCentral = document.getElementById('modoCarga').value === 'central';
        
        let baseY = ALTURA_SUELO;
        if (nivel === '2') baseY += 1.10;
        if (nivel === '3') baseY += 2.20;
        let posY = baseY + dim.y / 2;
        
        let candidates = [];
        
        pacas.forEach(p => {
            const pX = p.position.x; const pZ = p.position.z; const pY = p.position.y;
            const pDim = { x: p.geometry.parameters.width, y: p.geometry.parameters.height, z: p.geometry.parameters.depth };
            
            if (Math.abs(pY - posY) < 0.1) {
                if (isCentral) {
                    // En modo central, X es estricto: +/- 0.80 (10cm del centro + mitad de la paca de 1.40)
                    if (!p.userData.isLeftover) {
                        candidates.push({x: 0.80, y: posY, z: pZ + pDim.z/2 + gapActual + dim.z/2}); 
                        candidates.push({x: -0.80, y: posY, z: pZ + pDim.z/2 + gapActual + dim.z/2}); 
                    }
                    candidates.push({x: 0.80, y: posY, z: pZ - pDim.z/2 - gapActual - dim.z/2}); 
                    candidates.push({x: -0.80, y: posY, z: pZ - pDim.z/2 - gapActual - dim.z/2}); 
                    candidates.push({x: pX > 0 ? -0.80 : 0.80, y: posY, z: pZ}); 
                } else {
                    if (!p.userData.isLeftover) candidates.push({x: pX, y: posY, z: pZ + pDim.z/2 + gapActual + dim.z/2}); 
                    candidates.push({x: pX, y: posY, z: pZ - pDim.z/2 - gapActual - dim.z/2}); 
                    candidates.push({x: pX - pDim.x/2 - dim.x/2, y: posY, z: pZ}); 
                    candidates.push({x: pX + pDim.x/2 + dim.x/2, y: posY, z: pZ}); 
                }
            }
        });
        
        candidates.forEach(c => {
            // En modo estandar, el voladizo lateral bloquea. En central, se permite.
            if (!isCentral && (Math.abs(c.x) + dim.x/2 > ANCHO_PLATAFORMA/2 + 0.001)) return; 
            if (c.z - dim.z/2 >= largoPlat/2) return; 
            if (c.z - dim.z/2 < -largoPlat/2 - 0.001) return; 
            if (chequearColisiones(c.x, c.y, c.z, dim)) return; 
            if (!validSlots.some(v => Math.abs(v.x - c.x) < 0.01 && Math.abs(v.z - c.z) < 0.01)) validSlots.push(c);
        });
        
        const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(dim.x, dim.y, dim.z));
        validSlots.forEach(s => {
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x2ecc71, linewidth: 2 }));
            line.position.set(s.x, s.y, s.z);
            scene.add(line); guideMeshes.push(line);
        });
    }

    function onPointerMove(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(plane);
        
        const pnlOverhang = document.getElementById('overhangMsg');
        const detOverhang = document.getElementById('overhangDetails');
        const panelGuia = document.getElementById('estadoGuia');

        if (intersects.length > 0) {
            const dim = getDimPaca();
            const gapCM = getGapActual() === 0.12 ? "12" : "6.5";
            const nivel = document.getElementById('nivelElegido').value;
            const largoPlat = parseFloat(document.getElementById('plataformaLargo').value);
            const isCentral = document.getElementById('modoCarga').value === 'central';
            let rawX = intersects[0].point.x;
            let rawZ = intersects[0].point.z;

            if (isModoLibre) {
                panelGuia.className = "guide-panel";
                panelGuia.innerHTML = "🔓 MODO LIBRE<br><span style='font-size: 11px; font-weight: normal;'>Coloca la primera caja en este nivel.</span>";
                
                let posX = Math.round(rawX / GRID_SNAP) * GRID_SNAP;
                if (isCentral) { posX = rawX >= 0 ? 0.80 : -0.80; } // Fuerza posición central
                
                let posZ = Math.round(rawZ / GRID_SNAP) * GRID_SNAP;
                const limiteFrontal = -largoPlat/2 + (dim.z / 2);
                if (posZ < limiteFrontal) posZ = limiteFrontal;
                
                let baseY = ALTURA_SUELO;
                if (nivel === '2') baseY += 1.10;
                if (nivel === '3') baseY += 2.20;
                let posY = baseY + (dim.y / 2);
                
                rollOverMesh.position.set(posX, posY, posZ);
                
                const excesoAncho = Math.max(0, (Math.abs(posX) + dim.x / 2) - (ANCHO_PLATAFORMA / 2));
                const excesoTrasero = Math.max(0, (posZ + dim.z / 2) - (largoPlat / 2));
                const hayColision = chequearColisiones(posX, posY, posZ, dim);
                
                // Si hay colision o si sobresale (y no es modo central) -> BLOQUEA
                if (hayColision || (excesoAncho > 0 && !isCentral)) {
                    rollOverMesh.material.color.setHex(0xe74c3c);
                    pnlOverhang.className = "warning";
                    pnlOverhang.style.display = 'block';
                    detOverhang.innerHTML = "Posición inválida o chocando.";
                    currentMagneticSlot = null;
                } else if (excesoTrasero > 0) {
                    rollOverMesh.material.color.setHex(0xe67e22);
                    pnlOverhang.className = "warning leftover";
                    pnlOverhang.style.display = 'block';
                    detOverhang.innerHTML = `LÍMITE ALCANZADO<br>Espacio sobrante aprovechado.`;
                    currentMagneticSlot = {x: posX, y: posY, z: posZ, isLeftover: true}; 
                } else {
                    rollOverMesh.material.color.setHex(dim.color);
                    pnlOverhang.className = isCentral && excesoAncho > 0 ? "warning info" : "warning";
                    pnlOverhang.style.display = isCentral && excesoAncho > 0 ? 'block' : 'none';
                    if(isCentral) detOverhang.innerHTML = `✔️ Modo Central Activo<br>Sobresale a los lados: ${(excesoAncho * 100).toFixed(1)} cm`;
                    currentMagneticSlot = {x: posX, y: posY, z: posZ, isLeftover: false}; 
                }
            } else {
                panelGuia.className = "guide-panel magnetic";
                panelGuia.innerHTML = `🧲 MODO MAGNÉTICO<br><span style='font-size: 11px; font-weight: normal;'>Separación exacta de ${gapCM} cm.</span>`;
                
                if (validSlots.length > 0) {
                    let closestSlot = null; let minDist = Infinity;
                    validSlots.forEach(s => {
                        let d = Math.sqrt(Math.pow(s.x - rawX, 2) + Math.pow(s.z - rawZ, 2));
                        if (d < minDist) { minDist = d; closestSlot = s; }
                    });
                    
                    if (closestSlot && minDist < 1.5) {
                        rollOverMesh.position.set(closestSlot.x, closestSlot.y, closestSlot.z);
                        const excesoTrasero = Math.max(0, (closestSlot.z + dim.z / 2) - (largoPlat / 2));
                        const excesoAncho = Math.max(0, (Math.abs(closestSlot.x) + dim.x / 2) - (ANCHO_PLATAFORMA / 2));

                        if (excesoTrasero > 0) {
                            rollOverMesh.material.color.setHex(0xe67e22);
                            pnlOverhang.className = "warning leftover"; pnlOverhang.style.display = 'block';
                            detOverhang.innerHTML = `LÍMITE ALCANZADO`;
                            currentMagneticSlot = {x: closestSlot.x, y: closestSlot.y, z: closestSlot.z, isLeftover: true};
                        } else {
                            rollOverMesh.material.color.setHex(dim.color); 
                            pnlOverhang.className = isCentral && excesoAncho > 0 ? "warning info" : "warning";
                            pnlOverhang.style.display = isCentral && excesoAncho > 0 ? 'block' : 'none';
                            if(isCentral) detOverhang.innerHTML = `✔️ Modo Central Activo<br>Sobresale a los lados: ${(excesoAncho * 100).toFixed(1)} cm`;
                            currentMagneticSlot = {x: closestSlot.x, y: closestSlot.y, z: closestSlot.z, isLeftover: false};
                        }
                    } else {
                        rollOverMesh.position.set(rawX, rollOverMesh.position.y, rawZ);
                        rollOverMesh.material.color.setHex(0xe74c3c); pnlOverhang.className = "warning"; pnlOverhang.style.display = 'block';
                        detOverhang.innerHTML = "Acércate a las líneas verdes."; currentMagneticSlot = null;
                    }
                }
            }
        }
    }

    function onClickPlacer() {
        if (!currentMagneticSlot) return; 
        const dim = getDimPaca(); const orient = document.getElementById('orientacionPaca').value;
        const nivel = document.getElementById('nivelElegido').value;
        const posX = currentMagneticSlot.x; const posY = currentMagneticSlot.y; const posZ = currentMagneticSlot.z;
        
        if(chequearColisiones(posX, posY, posZ, dim)) return;
        
        const colorFinal = currentMagneticSlot.isLeftover ? 0xe67e22 : dim.color;
        const geometry = new THREE.BoxGeometry(dim.x, dim.y, dim.z);
        const paca = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color: colorFinal }));
        paca.position.set(posX, posY, posZ);
        
        paca.userData = { orientacion: orient, nivel: nivel, isLeftover: currentMagneticSlot.isLeftover };
        paca.add(new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 })));
        
        scene.add(paca); pacas.push(paca);
        pacasTracker[nivel][orient]++;
        
        document.getElementById('count').innerText = pacas.length;
        
        let altMax = 0;
        pacas.forEach(p => { altMax = Math.max(altMax, p.position.y + p.geometry.parameters.height/2); });
        document.getElementById('alturaActual').innerText = altMax.toFixed(2);
        
        currentMagneticSlot = null; rollOverMesh.position.set(9999, 9999, 9999);
        isModoLibre = false; onConfigChange(); 
    }

    function updatePlataforma() {
        crearRemolque(parseFloat(document.getElementById('plataformaLargo').value));
        pacas.forEach(p => scene.remove(p)); pacas = [];
        pacasTracker = { '1': {'0':0,'1':0,'2':0}, '2': {'0':0,'1':0,'2':0}, '3': {'0':0,'1':0,'2':0} };
        document.getElementById('count').innerText = "0";
        document.getElementById('alturaActual').innerText = "1.40";
        isModoLibre = true; onConfigChange();
    }

    function removeLast() {
        if(pacas.length > 0) {
            const p = pacas.pop(); scene.remove(p);
            pacasTracker[p.userData.nivel][p.userData.orientacion]--;
            document.getElementById('count').innerText = pacas.length;
            onConfigChange();
        }
    }

    function onWindowResize() {
        camera.aspect = (window.innerWidth - 360) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4'); 
        const canvas = renderer.domElement;
        rollOverMesh.visible = false; guideMeshes.forEach(m => m.visible = false);

        const origPos = camera.position.clone();
        const origTarget = controls.target.clone();
        const captureView = (posX, posY, posZ) => {
            camera.position.set(posX, posY, posZ);
            controls.target.set(0, 2, 0); controls.update();
            renderer.render(scene, camera);
            return canvas.toDataURL('image/png');
        };

        const img1 = captureView(8, 6, 8);
        const img2 = captureView(0, 3, 10);
        const img3 = captureView(10, 3, 0);

        camera.position.copy(origPos); controls.target.copy(origTarget); controls.update();
        renderer.render(scene, camera);
        rollOverMesh.visible = true; guideMeshes.forEach(m => m.visible = true);

        doc.setFontSize(22); doc.text("Informe: Carga de Pacas", 10, 20);
        doc.setFontSize(12);
        
        const modoCarga = document.getElementById('modoCarga').value;
        let textoModo = modoCarga === 'central' ? "Separación Central (10cm al eje)" : "Estándar (Pegadas a los lados)";
        
        doc.text(`Modo de Distribución: ${textoModo}`, 10, 32);
        if (modoCarga === 'central') {
            doc.text(`Espacio que sobresale a los lados: 20.0 cm por lado`, 10, 40);
        }
        
        doc.text(`Cantidad de cajas en plataforma: ${pacas.length}`, 10, modoCarga === 'central' ? 48 : 40);
        doc.text(`Altura total desde el suelo: ${document.getElementById('alturaActual').innerText} metros`, 10, modoCarga === 'central' ? 56 : 48);
        
        const addImg = (data, y) => { doc.addImage(data, 'PNG', 10, y, 190, 110); };

        let startImgY = modoCarga === 'central' ? 68 : 60;
        doc.text("Imagen 1: Vista general de la carga", 10, startImgY - 4);
        addImg(img1, startImgY);
        doc.addPage();
        doc.text("Imagen 2: Vista desde atrás", 10, 20);
        addImg(img2, 24);
        doc.text("Imagen 3: Vista desde el costado", 10, 145);
        addImg(img3, 149);

        doc.save(`Informe_Carga_Pacas.pdf`);
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    window.onload = init;
</script>
</body>
</html>
